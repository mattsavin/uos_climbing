<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/climbing%20team%20logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <title>Gallery | USCC</title>
</head>

<body>
    <div id="app">
        <main>
            <!-- Page Header -->
            <section
                class="pt-32 pb-16 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto text-center border-b border-white/5 relative overflow-hidden">
                <div
                    class="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[300px] bg-purple-500/10 blur-[100px] pointer-events-none rounded-full">
                </div>
                <h1 class="heading-xl mb-6 relative z-10">Club <span class="text-gradient">Highlights.</span></h1>
                <p class="text-xl text-slate-400 max-w-2xl mx-auto font-light relative z-10">Capturing the sends, the
                    falls, and everything in between.</p>
            </section>

            <!-- Gallery Grid Placeholder -->
            <section class="py-20 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
                <div id="public-gallery-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                    <!-- Images injected via JS -->
                </div>

                <div class="mt-20 p-8 glass-card border border-purple-500/20 bg-purple-500/5 text-center">
                    <h3 class="text-xl font-bold text-white mb-2">Notice a missing send?</h3>
                    <p class="text-slate-400 mb-6 font-light">Tag us in your Instagram posts <span
                            class="text-brand-gold font-bold">@uos_climb</span> to be featured on our site and social
                        channels!</p>
                    <a href="https://instagram.com/uos_climb" target="_blank" class="btn-primary">Follow our
                        Instagram</a>
                </div>
            </section>
        </main>
    </div>
    <script type="module" src="/src/gallery.ts"></script>
    <script type="module">
        import { initApp } from '/src/main.ts';
        initApp();
    </script>
</body>

</html>
